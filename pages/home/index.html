<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主页</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <style>
    .home-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    
    .game-title {
      font-size: 56px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffb6c1, #ff9eb5, #ff6b9d, #ff8fab);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      position: relative;
      animation: float 4s ease-in-out infinite;
    }
    
    .game-title::before {
      content: '✧';
      position: absolute;
      left: -50px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 32px;
      -webkit-text-fill-color: initial;
      color: var(--accent-light);
      animation: twinkle 2s ease-in-out infinite;
    }
    
    .game-title::after {
      content: '✧';
      position: absolute;
      right: -50px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 32px;
      -webkit-text-fill-color: initial;
      color: var(--accent-light);
      animation: twinkle 2s ease-in-out infinite 0.5s;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.4; transform: translateY(-50%) scale(1); }
      50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
    }
    
    .game-subtitle {
      font-size: 17px;
      color: var(--text-secondary);
      margin-bottom: 45px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .game-subtitle::before,
    .game-subtitle::after {
      content: '♡';
      color: var(--accent-light);
      font-size: 14px;
    }
    
    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 280px;
    }
    
    .menu-btn {
      width: 100%;
      padding: 18px 32px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
      font-weight: 600;
    }
    
    .menu-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.6s ease;
    }
    
    .menu-btn:hover::before {
      left: 100%;
    }
    
    .menu-btn.start {
      background: linear-gradient(135deg, #ff9eb5, #ff6b9d, #ff8fab);
      background-size: 200% 100%;
      color: white;
      box-shadow: 0 6px 28px rgba(255, 107, 157, 0.4);
      animation: gradientShift 3s ease infinite;
    }
    
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .menu-btn.start:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 12px 40px rgba(255, 107, 157, 0.5);
    }
    
    .menu-btn.start::after {
      content: '→';
      position: absolute;
      right: 20px;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
    }
    
    .menu-btn.start:hover::after {
      opacity: 1;
      transform: translateX(0);
    }
    
    .menu-btn.normal {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 250, 252, 0.9));
      color: var(--text-primary);
      border: 2px solid rgba(255, 182, 193, 0.5);
      box-shadow: 0 4px 18px rgba(255, 107, 157, 0.12);
    }
    
    .menu-btn.normal:hover {
      border-color: var(--accent-primary);
      background: linear-gradient(135deg, #fff, #fff5f7);
      transform: translateX(8px);
      box-shadow: 0 6px 24px rgba(255, 107, 157, 0.2);
    }
    
    .menu-btn.normal::before {
      content: '♡';
      font-size: 14px;
      color: var(--accent-light);
      margin-right: -8px;
    }
    
    .menu-btn.exit {
      background: transparent;
      color: var(--text-secondary);
      border: 2px solid rgba(255, 182, 193, 0.35);
    }
    
    .menu-btn.exit:hover {
      background: linear-gradient(135deg, rgba(255, 107, 157, 0.1), rgba(255, 158, 181, 0.08));
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      transform: translateY(-2px);
    }
    
    .version-info {
      position: absolute;
      bottom: 35px;
      font-size: 13px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .version-info::before {
      content: '✿';
      color: var(--accent-light);
    }
    
    /* 加载覆盖层 */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #fff5f7, #ffe0e8, #ffd6e0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    
    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    
    .loading-logo {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffb6c1, #ff9eb5, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: float 3s ease-in-out infinite;
    }
    
    .loading-spinner-wrapper {
      position: relative;
      width: 60px;
      height: 60px;
    }
    
    .loading-spinner {
      position: absolute;
      top: 0;
      left: 0;
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 182, 193, 0.3);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s ease-in-out infinite;
    }
    
    .loading-spinner-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .loading-text {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .progress-bar {
      width: 300px;
      height: 12px;
      background: linear-gradient(90deg, rgba(255, 182, 193, 0.3), rgba(255, 200, 212, 0.25));
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 6px rgba(255, 107, 157, 0.1);
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffc4d4, #ff9eb5, #ff6b9d);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 20px;
      box-shadow: 0 0 12px rgba(255, 107, 157, 0.4);
    }
    
    /* Toast 通知 */
    .toast-container {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }
    
    .toast {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 250, 252, 0.95));
      border: 2px solid rgba(255, 182, 193, 0.5);
      border-radius: 16px;
      padding: 14px 28px;
      box-shadow: 0 6px 24px rgba(255, 107, 157, 0.2);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .toast::before {
      content: '♡';
      color: var(--accent-primary);
    }
    
    .toast.error {
      border-color: #ffa39e;
      background: linear-gradient(135deg, rgba(255, 163, 158, 0.12), rgba(255, 255, 255, 0.98));
    }
    
    .toast.error::before {
      content: '!';
      color: #ff7875;
      font-weight: 700;
    }
    
    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    /* 装饰元素 */
    .decoration {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    
    .dec-1 { top: 10%; left: 5%; font-size: 24px; animation: float 5s ease-in-out infinite; }
    .dec-2 { top: 20%; right: 8%; font-size: 20px; animation: float 6s ease-in-out infinite 0.5s; }
    .dec-3 { bottom: 15%; left: 10%; font-size: 22px; animation: float 7s ease-in-out infinite 1s; }
    .dec-4 { bottom: 25%; right: 5%; font-size: 18px; animation: float 5.5s ease-in-out infinite 0.3s; }
  </style>
</head>
<body>
  <!-- 装饰元素 -->
  <div class="decoration dec-1">✦</div>
  <div class="decoration dec-2">✧</div>
  <div class="decoration dec-3">✿</div>
  <div class="decoration dec-4">♡</div>

  <!-- Toast 通知容器 -->
  <div class="toast-container" id="toastContainer"></div>
  
  <!-- 加载覆盖层 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-logo">自定义</div>
    <div class="loading-spinner-wrapper">
      <div class="loading-spinner"></div>
      <div class="loading-spinner-center">♡</div>
    </div>
    <div class="loading-text" id="loadingText">正在加载...</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- 标题栏 -->
  <div class="title-bar">
    <span class="title-bar-title">自定义</span>
    <div class="title-bar-controls">
      <button class="title-bar-btn" onclick="electronAPI.minimizeWindow()">─</button>
      <button class="title-bar-btn" onclick="electronAPI.maximizeWindow()">□</button>
      <button class="title-bar-btn close" onclick="electronAPI.closeWindow()">✕</button>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main-content">
    <div class="home-container">
      <h1 class="game-title">自定义</h1>
      
      <div class="menu-buttons">
        <button class="menu-btn start" onclick="enterGame()">
          进入游戏
        </button>
        
        <button class="menu-btn normal" onclick="navigateTo('character')">
          角色设定
        </button>
        
        <button class="menu-btn normal" onclick="navigateTo('config')">
          系统配置
        </button>
        
        <button class="menu-btn exit" onclick="electronAPI.closeWindow()">
          退出游戏
        </button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
