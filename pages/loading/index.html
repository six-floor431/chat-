<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载中</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <style>
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      position: relative;
      z-index: 1;
    }
    
    /* 装饰星星 */
    .loading-container::before {
      content: '✦ ✧ ✦';
      position: absolute;
      top: -60px;
      font-size: 18px;
      color: var(--accent-light);
      letter-spacing: 20px;
      animation: twinkle 2s ease-in-out infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    
    .loading-logo {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffb6c1, #ff9eb5, #ff6b9d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: float 3s ease-in-out infinite;
      position: relative;
      text-shadow: 0 0 30px rgba(255, 107, 157, 0.3);
    }
    
    .loading-logo::after {
      content: ' ♡';
      position: absolute;
      right: -50px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      -webkit-text-fill-color: initial;
      color: var(--accent-primary);
      animation: heartbeat 1.5s ease-in-out infinite;
    }
    
    /* 可爱的加载动画容器 */
    .loading-animation {
      position: relative;
      width: 80px;
      height: 80px;
    }
    
    .loading-spinner {
      position: absolute;
      top: 0;
      left: 0;
      width: 80px;
      height: 80px;
      border: 4px solid transparent;
      border-top-color: var(--accent-primary);
      border-right-color: var(--accent-secondary);
      border-bottom-color: var(--accent-light);
      border-left-color: var(--primary-pink-lighter);
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
    }
    
    .loading-spinner::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 12px;
      border: 3px solid transparent;
      border-top-color: var(--accent-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite reverse;
    }
    
    .loading-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .loading-text {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .loading-text::before,
    .loading-text::after {
      content: '✿';
      color: var(--accent-light);
      font-size: 14px;
      animation: spinFlower 3s linear infinite;
    }
    
    .loading-text::after {
      animation-direction: reverse;
    }
    
    @keyframes spinFlower {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .progress-bar {
      width: 300px;
      height: 12px;
      background: linear-gradient(90deg, rgba(255, 182, 193, 0.25), rgba(255, 200, 212, 0.2));
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 2px 6px rgba(255, 107, 157, 0.12);
      position: relative;
    }
    
    .progress-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.4), transparent);
      border-radius: 20px 20px 0 0;
      z-index: 1;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffc4d4, #ff9eb5, #ff6b9d, #ff8fab);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      width: 0%;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 20px;
      position: relative;
      box-shadow: 0 0 15px rgba(255, 107, 157, 0.5);
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    .loading-tips {
      position: absolute;
      bottom: 60px;
      font-size: 14px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.9;
    }
    
    .loading-tips::before {
      content: '☆';
      color: var(--accent-secondary);
    }
    
    .loading-tips::after {
      content: '☆';
      color: var(--accent-secondary);
    }
    
    /* 背景装饰 */
    .decoration {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }
    
    .decoration-1 {
      top: 15%;
      right: 10%;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(255, 182, 193, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: floatBubble 8s ease-in-out infinite;
    }
    
    .decoration-2 {
      bottom: 20%;
      left: 8%;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(255, 158, 181, 0.25) 0%, transparent 70%);
      border-radius: 50%;
      animation: floatBubble 10s ease-in-out infinite reverse;
    }
    
    .decoration-3 {
      top: 60%;
      right: 15%;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(255, 200, 212, 0.2) 0%, transparent 70%);
      border-radius: 50%;
      animation: floatBubble 12s ease-in-out infinite;
    }
    
    @keyframes floatBubble {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
      25% { transform: translate(20px, -30px) scale(1.1); opacity: 1; }
      50% { transform: translate(-15px, 15px) scale(0.9); opacity: 0.7; }
      75% { transform: translate(25px, 20px) scale(1.05); opacity: 0.9; }
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div class="decoration decoration-1"></div>
  <div class="decoration decoration-2"></div>
  <div class="decoration decoration-3"></div>

  <!-- 标题栏 -->
  <div class="title-bar">
    <span class="title-bar-title">自定义</span>
    <div class="title-bar-controls">
      <button class="title-bar-btn" onclick="electronAPI.minimizeWindow()">─</button>
      <button class="title-bar-btn" onclick="electronAPI.maximizeWindow()">□</button>
      <button class="title-bar-btn close" onclick="electronAPI.closeWindow()">✕</button>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main-content">
    <div class="loading-container">
      <div class="loading-logo">自定义</div>
      
      <div class="loading-animation">
        <div class="loading-spinner"></div>
        <div class="loading-center">♡</div>
      </div>
      
      <div class="loading-text" id="loadingText">正在加载资源...</div>
      
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
